<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — SynoRhythm</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Admin-specific ───────────────────────────────────── */
    .transport-row {
      display:     flex;
      gap:         0.6rem;
      flex-wrap:   wrap;
      align-items: center;
    }

    .cb-row {
      display:     flex;
      align-items: center;
      gap:         0.5rem;
      margin-top:  0.55rem;
    }
    .cb-row input[type="checkbox"] {
      accent-color: var(--accent);
      cursor:       pointer;
      width:        13px;
      height:       13px;
    }
    .cb-row label {
      font-size:   0.68rem;
      color:       var(--muted);
      cursor:      pointer;
      user-select: none;
    }

    /* ── Vote summary ─────────────────────────────────────── */
    #vote-panel { flex: 1; overflow-y: auto; }

    .vote-header {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      margin-bottom:   0.6rem;
    }

    .vote-empty {
      color:     var(--muted);
      font-size: 0.75rem;
      padding:   0.5rem 0;
    }

    .total-count {
      font-size:  0.65rem;
      color:      var(--muted);
      margin-top: 0.6rem;
    }
    .total-count span { color: var(--accent); }

    /* ── Sonification pattern buttons ────────────────────────── */
    .pattern-btns {
      display:   flex;
      flex-wrap: wrap;
      gap:       0.5rem;
      margin-bottom: 0.75rem;
    }

    .btn-pattern-active {
      background:   linear-gradient(to bottom, #66dd88 0%, #009933 55%, #007722 56%, #22cc55 100%) !important;
      border-color: #005522 !important;
      box-shadow:   3px 3px 0 #003311, inset 0 1px 0 rgba(255,255,255,0.35) !important;
      color:        white !important;
    }
    .btn-pattern-active:hover:not(:disabled) {
      background: linear-gradient(to bottom, #88ee99 0%, #00aa44 55%, #008833 56%, #33dd66 100%) !important;
      box-shadow: 4px 4px 0 #003311, inset 0 1px 0 rgba(255,255,255,0.35) !important;
    }

    .secret-word-row {
      display:     flex;
      align-items: center;
      gap:         0.5rem;
      margin-top:  0.1rem;
    }
    .secret-word-row label {
      font-size:      0.72rem;
      font-weight:    bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color:          var(--muted);
      white-space:    nowrap;
    }

    /* ── Tempo panel ─────────────────────────────────────────── */
    .tempo-sub-label {
      font-size:      0.68rem;
      font-weight:    bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color:          var(--muted);
      margin-bottom:  0.35rem;
      display:        block;
    }

    .tempo-next-row {
      display:     flex;
      align-items: center;
      gap:         0.65rem;
      margin-top:  0.55rem;
    }

    .bpm-input {
      width:       5.5rem;
      padding:     0.45rem 0.6rem;
      border:      2px solid #cc55aa;
      border-top-color:  #aa3388;
      border-left-color: #aa3388;
      border-radius: 5px;
      background:  #fff8fe;
      font-family: var(--font);
      font-size:   1rem;
      color:       var(--purple);
      font-weight: bold;
      outline:     none;
      box-shadow:  inset 0 2px 5px rgba(200,0,120,0.1);
    }
    .bpm-input:focus {
      border-color: var(--pink);
      box-shadow:   inset 0 2px 5px rgba(200,0,120,0.1),
                    0 0 0 3px rgba(224,8,154,0.22);
    }

    #bpm-ratio-hint {
      font-size:   0.65rem;
      color:       var(--muted);
      font-style:  italic;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div class="page-header">
  <span class="page-title">SynoRhythm — Admin</span>
  <span class="status-line">
    <span class="dot" id="conn-dot"></span>
    <span id="conn-label">connecting…</span>
  </span>
</div>

<!-- ── Body ────────────────────────────────────────────────── -->
<div class="page-body">

  <!-- ── Transport ───────────────────────────────────────── -->
  <div class="panel">
    <span class="panel-label">Transport</span>
    <div class="transport-row">
      <button class="btn-accent" id="start-btn">▶ Start (sync in 5 s)</button>
      <button class="btn-warn"   id="stop-btn">■ Stop</button>
      <button class="btn-danger" id="reset-btn">↺ Reset All</button>
    </div>
    <div class="status-line" style="margin-top: 0.65rem;">
      <span class="dot" id="play-dot"></span>
      <span id="play-label">idle</span>
    </div>
    <div style="margin-top:0.75rem;">
      <span class="tempo-sub-label">Session Tempo List (BPM, comma-separated — sent at start)</span>
      <div class="row">
        <input type="text" class="grow" id="tempo-list-input"
               value="150" placeholder="e.g. 150, 144, 120, 90" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- ── Send Prompt (everything above the button is sent together) ── -->
  <div class="panel">
    <span class="panel-label">Send Prompt</span>

    <div class="tempo-next-row">
      <span class="tempo-sub-label" style="margin:0;white-space:nowrap;">BPM</span>
      <input type="number" id="bpm-input" class="bpm-input"
             min="20" max="400" step="1" placeholder="—">
      <span id="bpm-ratio-hint"></span>
    </div>

    <span class="tempo-sub-label" style="margin-top:0.9rem;">Sonification Pattern</span>
    <div class="pattern-btns">
      <button class="btn-pattern" data-pattern="letter-gates">Letter Gates</button>
      <button class="btn-pattern" data-pattern="vowel-gates">Vowel Gates</button>
      <button class="btn-pattern" data-pattern="consonant-gates">Consonant Gates</button>
      <button class="btn-pattern" data-pattern="shared-gates">Shared Gates</button>
      <button class="btn-pattern" data-pattern="secret-gates">Secret Gates</button>
    </div>
    <div class="secret-word-row">
      <label>Secret Word:</label>
      <input type="text" id="secret-word-input" class="grow"
             placeholder="Enter secret word…" autocomplete="off">
      <button id="set-secret-btn">Set</button>
    </div>

    <span class="tempo-sub-label" style="margin-top:0.9rem;">Sound</span>
    <div class="pattern-btns" style="margin-bottom:0.5rem;">
      <button class="btn-pattern btn-timbre" data-timbre="tone">Sine Tone</button>
      <button class="btn-pattern btn-timbre" data-timbre="noise">White Noise</button>
      <button class="btn-pattern btn-timbre" data-timbre="files">Samples</button>
    </div>
    <div id="sample-picker" style="display:none;">
      <span class="tempo-sub-label">Sample</span>
      <div class="pattern-btns" style="margin-bottom:0;">
        <button class="btn-pattern btn-sample" data-sample="0">1</button>
        <button class="btn-pattern btn-sample" data-sample="1">2</button>
        <button class="btn-pattern btn-sample" data-sample="2">3</button>
        <button class="btn-pattern btn-sample" data-sample="3">4</button>
        <button class="btn-pattern btn-sample" data-sample="4">5</button>
        <button class="btn-pattern btn-sample" data-sample="5">6</button>
      </div>
    </div>

    <div class="row" style="margin-top:1rem; padding-top:0.75rem; border-top:2px dashed #ffaadd;">
      <input type="text" class="grow" id="prompt-input"
             placeholder="Enter prompt text…" autocomplete="off">
      <button class="btn-accent" id="send-prompt-btn" disabled>Send Prompt</button>
    </div>
  </div>

  <!-- ── Live vote summary ────────────────────────────────── -->
  <div class="panel" id="vote-panel">
    <div class="vote-header">
      <span class="panel-label" style="margin:0;">Live Votes</span>
      <button id="clear-votes-btn">Clear Votes</button>
    </div>
    <div id="vote-list">
      <div class="vote-empty">No votes yet.</div>
    </div>
    <div class="total-count" id="total-count" style="display:none;">
      Total responses: <span id="total-num">0</span>
      &nbsp;|&nbsp;
      Unique words: <span id="unique-num">0</span>
    </div>
  </div>

</div>

<!-- ── Script ──────────────────────────────────────────────── -->
<script>
'use strict';

// ── Config ────────────────────────────────────────────────────
const SERVER      = 'https://relay.brianellissound.com';
const NS          = 'karp2025';
const STATE_KEY   = `${NS}-state`;
const VOTES_KEY   = `${NS}-votes`;
const PATTERN_KEY = `${NS}-pattern`;
const POLL_MS     = 1000;

// ── DOM refs ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const promptInput     = $('prompt-input');
const sendPromptBtn   = $('send-prompt-btn');
const startBtn        = $('start-btn');
const stopBtn         = $('stop-btn');
const resetBtn        = $('reset-btn');
const clearVotesBtn   = $('clear-votes-btn');
const voteList        = $('vote-list');
const totalCount      = $('total-count');
const totalNum        = $('total-num');
const uniqueNum       = $('unique-num');
const connDot         = $('conn-dot');
const connLabel       = $('conn-label');
const playDot         = $('play-dot');
const playLabel       = $('play-label');
const secretWordInput = $('secret-word-input');
const setSecretBtn    = $('set-secret-btn');
const tempoListInput  = $('tempo-list-input');
const bpmInput        = $('bpm-input');
const bpmRatioHint    = $('bpm-ratio-hint');
const patternBtns     = document.querySelectorAll('.btn-pattern:not(.btn-timbre):not(.btn-sample)');
const timbreBtns      = document.querySelectorAll('.btn-timbre');
const sampleBtns      = document.querySelectorAll('.btn-sample');
const samplePicker    = $('sample-picker');

// ── Pattern + timbre state ────────────────────────────────────
let activePattern     = '';
let activeTimbre      = '';
let activeSampleIndex = null;

// ── Tempo / BPM state ─────────────────────────────────────────
let lastBPM          = 150;
let lastBPMDirection = null; // 'increased' | 'decreased'
let prevPromptText   = '';

// ── Tempo helpers ─────────────────────────────────────────────
function gcd(a, b) {
  a = Math.max(1, Math.abs(Math.round(a)));
  b = Math.max(1, Math.abs(Math.round(b)));
  while (b) { [a, b] = [b, a % b]; }
  return a;
}

function computeAutoTempo(prevLen, currLen, currentBPM, lastDirection) {
  if (!prevLen || !currLen) return currentBPM;
  const g  = gcd(prevLen, currLen);
  const hi = Math.max(prevLen / g, currLen / g);
  const lo = Math.min(prevLen / g, currLen / g);
  const ratio = lastDirection === 'increased' ? lo / hi : hi / lo;
  return Math.max(20, Math.min(400, Math.round(currentBPM * ratio * 10) / 10));
}

// ── Send-button validation ────────────────────────────────────
function isReadyToSend() {
  if (!promptInput.value.trim()) return false;
  const bpm = parseFloat(bpmInput.value);
  if (!bpm || bpm < 20 || bpm > 400) return false;
  if (!activePattern) return false;
  if (!activeTimbre)  return false;
  if (activeTimbre === 'files' && activeSampleIndex === null) return false;
  return true;
}
function refreshSendBtn() {
  sendPromptBtn.disabled = !isReadyToSend();
}

// Auto-compute BPM as admin types a new prompt
promptInput.addEventListener('input', () => {
  if (prevPromptText) {
    const curr = promptInput.value.trim();
    if (curr) {
      const newBPM = computeAutoTempo(prevPromptText.length, curr.length, lastBPM, lastBPMDirection);
      bpmInput.value = newBPM;
      const g = gcd(prevPromptText.length, curr.length);
      const dir = lastBPMDirection === 'increased' ? '↓' : '↑';
      bpmRatioHint.textContent =
        `ratio ${prevPromptText.length/g}:${curr.length/g} ${dir}`;
    }
  }
  refreshSendBtn();
});
bpmInput.addEventListener('input', refreshSendBtn);

// ── Pattern + timbre posting (only called from Send Prompt) ───
function postPattern() {
  return fetch(`${SERVER}/post_message/${PATTERN_KEY}`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({
      patternName:  activePattern,
      secretWord:   secretWordInput.value.trim(),
      timbreType:   activeTimbre,
      sampleIndex:  activeSampleIndex ?? 0,
      sentAt:       Date.now()
    })
  });
}

patternBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    activePattern = btn.dataset.pattern;
    patternBtns.forEach(b => {
      b.classList.toggle('btn-pattern-active', b.dataset.pattern === activePattern);
    });
    refreshSendBtn();
  });
});

timbreBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    activeTimbre = btn.dataset.timbre;
    timbreBtns.forEach(b => {
      b.classList.toggle('btn-pattern-active', b.dataset.timbre === activeTimbre);
    });
    samplePicker.style.display = activeTimbre === 'files' ? 'block' : 'none';
    refreshSendBtn();
  });
});

sampleBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    activeSampleIndex = +btn.dataset.sample;
    sampleBtns.forEach(b => {
      b.classList.toggle('btn-pattern-active', +b.dataset.sample === activeSampleIndex);
    });
    refreshSendBtn();
  });
});

setSecretBtn.addEventListener('click', () => {
  setSecretBtn.textContent = 'Set ✓';
  setTimeout(() => { setSecretBtn.textContent = 'Set'; }, 1500);
});

// ── Helpers ───────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function parseTempoList() {
  return tempoListInput.value
    .split(',')
    .map(s => parseFloat(s.trim()))
    .filter(n => !isNaN(n) && n > 0);
}

async function postState(state) {
  return fetch(`${SERVER}/post_message/${STATE_KEY}`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ ...state, sentAt: Date.now() })
  });
}

async function doClearVotes() {
  return fetch(`${SERVER}/clear_message/${VOTES_KEY}`, { method: 'POST' });
}

// ── Transport ─────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  const startAt   = Date.now() + 5000;
  const prompt    = promptInput.value.trim();
  const bpm       = parseFloat(bpmInput.value) || lastBPM;
  const tempoList = parseTempoList();
  if (!tempoList.length) tempoList.push(bpm);

  await postState({ action: 'start', startAt, prompt: prompt || undefined, bpm, tempoList });

  lastBPM = bpm;

  playDot.classList.add('active');
  playLabel.textContent = 'syncing — all clients start in 5 s';
  startBtn.disabled     = true;
  startBtn.textContent  = '▶ Started';
});

stopBtn.addEventListener('click', async () => {
  await postState({ action: 'stop' });
  playDot.classList.remove('active');
  playLabel.textContent = 'stopped';
  startBtn.disabled     = false;
  startBtn.textContent  = '▶ Start (sync in 5 s)';
});

async function doReset() {
  await doClearVotes();
  await fetch(`${SERVER}/clear_message/${STATE_KEY}`, { method: 'POST' });
  await postState({ action: 'reset', prompt: '' });
  playDot.classList.remove('active');
  playLabel.textContent    = 'idle';
  startBtn.disabled        = false;
  startBtn.textContent     = '▶ Start (sync in 5 s)';
  promptInput.value        = '';
  prevPromptText           = '';
  bpmInput.value           = '';
  bpmRatioHint.textContent = '';
  activePattern            = '';
  activeTimbre             = '';
  activeSampleIndex        = null;
  patternBtns.forEach(b => b.classList.remove('btn-pattern-active'));
  timbreBtns.forEach(b  => b.classList.remove('btn-pattern-active'));
  sampleBtns.forEach(b  => b.classList.remove('btn-pattern-active'));
  samplePicker.style.display = 'none';
  renderVotes({});
  refreshSendBtn();
}

// sendBeacon is the only fetch that survives page close
function beaconReset() {
  const body = new Blob(
    [JSON.stringify({ action: 'reset', prompt: '', sentAt: Date.now() })],
    { type: 'application/json' }
  );
  navigator.sendBeacon(`${SERVER}/clear_message/${VOTES_KEY}`);
  navigator.sendBeacon(`${SERVER}/clear_message/${STATE_KEY}`);
  navigator.sendBeacon(`${SERVER}/post_message/${STATE_KEY}`, body);
}

resetBtn.addEventListener('click', async () => {
  if (!confirm('Reset all players, clear votes, and clear prompt?')) return;
  await doReset();
});

sendPromptBtn.addEventListener('click', async () => {
  const prompt = promptInput.value.trim();
  const bpm    = parseFloat(bpmInput.value) || lastBPM;

  await doClearVotes();
  await postState({ action: 'prompt', prompt, bpm });
  await postPattern();

  // Update direction tracking for next auto-compute
  if (bpm > lastBPM)      lastBPMDirection = 'increased';
  else if (bpm < lastBPM) lastBPMDirection = 'decreased';
  prevPromptText = prompt;
  lastBPM        = bpm;
  bpmRatioHint.textContent = '';

  sendPromptBtn.textContent = 'Sent ✓';
  setTimeout(() => { sendPromptBtn.textContent = 'Send Prompt'; }, 1800);
});
promptInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !sendPromptBtn.disabled) sendPromptBtn.click();
});

clearVotesBtn.addEventListener('click', async () => {
  if (!confirm('Clear all votes?')) return;
  await doClearVotes();
  renderVotes({});
});

// ── Vote rendering ────────────────────────────────────────────
function renderVotes(data) {
  const counts = {};
  let total = 0;
  for (const pid in data) {
    const w = (data[pid].word || '').trim();
    if (w) { counts[w] = (counts[w] || 0) + 1; total++; }
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  if (!sorted.length) {
    voteList.innerHTML = '<div class="vote-empty">No votes yet.</div>';
    totalCount.style.display = 'none';
    return;
  }

  const maxC = sorted[0][1];
  voteList.innerHTML = sorted.map(([word, count]) => `
    <div class="vote-row">
      <span class="vote-word">${esc(word)}</span>
      <div class="vote-bar-wrap">
        <div class="vote-bar" style="width:${(count / maxC * 100).toFixed(1)}%"></div>
      </div>
      <span class="vote-count">${count}</span>
    </div>
  `).join('');

  totalNum.textContent  = total;
  uniqueNum.textContent = sorted.length;
  totalCount.style.display = 'block';
}

// ── Polling ───────────────────────────────────────────────────
async function pollVotes() {
  try {
    const res  = await fetch(`${SERVER}/get_message/${VOTES_KEY}`);
    const data = await res.json();
    renderVotes(data);
    connDot.classList.add('active');
    connLabel.textContent = 'connected';
  } catch (e) {
    connDot.classList.remove('active');
    connLabel.textContent = 'error — retrying';
  }
}

setInterval(pollVotes, POLL_MS);
pollVotes();

// Auto-reset on open and close
doReset();
window.addEventListener('beforeunload', beaconReset);
</script>
</body>
</html>
